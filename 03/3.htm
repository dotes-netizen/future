          <p><font color="#0000FF">看著頂犁社區的舊房子，讓我想到歷史的演變，不管未來會怎麼樣發展，這些文化也應該被保留下來˙，對吧？</font></p>
          <p><font color="#0000FF">雖然就屋子幾乎沒有人再住了，但是曾有的人情味，還是在這些歷史文物上被保留了下來。</font></p>
          <p><font color="#0000FF">如果大家想來這裡的話，請記得部要破壞它喔！</font></p>
