          <p>范府是王爺名承業，生於隨朝，死後被玉帝側封為「代天巡狩」是五府王爺最年幼者，與其他王爺同駐守人間，坐擁王船巡狩四方驅疫逐瘟、維護天下太平。范府王爺濟世神蹟不斷更處理許多現今醫學無法處理的案例，患者及家屬嘖嘖稱奇。以下是我們採訪的照片:</p>
