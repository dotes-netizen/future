          <td><p> 王建公<br>
          本廟是鄭成功在1660年，光復台灣 ，命提督大將軍馬信帶領二萬多名士兵，分七路軍征討中央山脈，其中有一名二品官叫王建為第二路軍，他帶領一千多名士兵朝北攻打，但他不幸戰死在大約口厝村 附近。到了一久零零年間有一位叫黃奇綠老先生要鏟平田裡的大沙崙，要建一間田頭寮遮風避雨，結果發現一身軀的白骨便發現這可能是時常顯靈的王建公靈骨，便 在此建一間小神嗣早晚膜拜，當時稱海尾公。<br>
          以下是我們採訪的照片:</p>
