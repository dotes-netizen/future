        <td height="780"><p align="center"><img src="7_files/DSC00328.jpg" height="270" width="320"><img src="7_files/PICT0467.jpg" height="270" width="320"></p>
          <p align="center">每當到國曆7月份，</p>
          <p align="center">田間就會有收稻機在天裡穿梭，</p>
          <p align="center">我爺爺說：以前插秧、收稻都要一個月多，現在機器一個禮拜就成，好方便喔。</p>
          <p align="center"><img src="7_files/DSC00338.jpg" height="270" width="320">!<img src="7_files/DSC00336.jpg" height="270" width="320"></p>
          <p align="center">這是把割起來的稻榖卸到貨車上，有人會直接載去賣，有人會倒在家中的大空地曝曬。<img src="7_files/DSC01808.jpg" height="270" width="320"><img src="7_files/DSC01811.jpg" height="270" width="320"></p>
          <p align="center">這是水稻，從插秧到收割只到短短3個月。</p>
          <p align="center"><img src="7_files/DSC01800.jpg" height="270" width="320"><img src="7_files/DSC01822.jpg" height="270" width="320"></p>
          <p align="center">這是收割完的稻田，稻草會綁成一綑綑，以前灶要起火可以用。</p>
          <p align="center">收割稻穀的老闆說：早上只要露水乾就可以馬上收割，最怕下午來一陣西北雨。</p>
