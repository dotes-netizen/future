        <td height="780"><p align="center"><img src="3_files/DSC01592.jpg" height="270" width="320"><img src="3_files/DSC01733.jpg" height="270" width="320"></p>
          <p align="center">線西唯一的媽祖廟「<b>寶</b>安宮」，不是「<b>保</b>安宮」，主神：「<b>天上聖母</b>」，<b>農曆3月23日</b>聖誕千秋，</p>
          <p align="center">會辦<b>法會</b>、<b>平安餐</b>等等。主任委員：<b>施復興</b></p>
          <p align="center"><img src="3_files/DSC01545.jpg" height="270" width="320"><img src="3_files/DSC01546.jpg" height="270" width="320"></p>
          <p align="center">「<b>塭仙宮</b>」主神:「<b>道德天尊</b>」(老仙公)、「<b>清府王爺</b>」、「<b>玄天上帝</b>」，<b>清府王爺在台灣為少數</b>。</p>
          <p align="center"><img src="3_files/30567_363561857087283_121611283_n.jpg" height="500" width="375"></p>
          <p align="center">這是寶安宮晚上的夜景。</p>
          <p align="center"><img src="3_files/1013430_388984234540647_993398231_n.jpg" height="270" width="320"><img src="3_files/165403_359868304118907_668338996_n.jpg" height="270" width="320"></p>
          <p align="center">這是輕府王爺年輕版。</p>
          <p align="center"><img src="3_files/294327_301097386584042_1098838481_n.jpg" height="270" width="320"><img src="3_files/298007_301097436584037_1437128401_n.jpg" height="270" width="320"></p>
          <p align="center">塭仙宮武轎班出去進香的陣頭。</p>
          <p align="center"><img src="3_files/DSC01827.jpg" height="240" width="320"><img src="3_files/DSC01825.jpg" height="240" width="320"></p>
          <p align="center">聽村長說：五營將軍託夢給村長說要換旗子，因為入火安座到上個月都沒有換想換新的；</p>
          <p align="center">這一塊扁是入火安座鄉長許清圭敬獻。</p>
