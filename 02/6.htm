        <td><p><font color="#237BDC"><b>活動中心時常有辦一些活動，晚上可以聽到有人在唱歌、也有人在跳舞，有一些大活動也會在這裡舉辦，有時可以看到老人帶著小朋友參加活動。</b></font></p>
          <p><img src="6_files/DSC02323.jpg" height="399" width="533"></p>
          <p>平時是沒有人在，除非有活動才有許多人。</p>
          <p><img src="6_files/DSC02322.jpg" height="525" width="464"></p>
          <p>公告欄資料都在這裡公布。</p>
          <p><img src="6_files/DSC02325.jpg" height="525" width="476"></p>
          <p>活動中心旁有籃球場，下午會有年輕人打球</p>
          <p><img src="6_files/DSC02317.jpg" height="382" width="510"></p>
          <p>籃球場是可以休閒的好地方。</p>
          <p><img src="6_files/DSC02318.jpg" height="392" width="523"></p>
          <p>心得分享:</p>
          <p>這棟活動中心已經蓋了十幾年了，而且，也是很多人會來的地方，而且，因為這裡有籃球場，所以，也會有很多人來這裡打球。</p>
