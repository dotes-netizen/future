          <td><p align="center">家修公園是下犁第一座公園，內有一棵八十幾年的老榕樹</p>
            <p align="center"><img src="5_files/DSCI0035001.jpg" height="525" width="700"></p>
            <p align="center">涼亭的牌子是92年二月從海邊撿來的木頭做成的，涼亭的木頭是用石頭做的</p>
            <p align="center"><img src="5_files/DSCI0045.jpg" height="525" width="700"></p>
            <p align="center">園中茶樹都是村長和村長太太種植的(截圖)</p>
            <p align="center"><img src="5_files/DSCI0037001.jpg" height="625" width="469"></p>
            <p align="center">村長與村長太太辛苦的從日月潭將這些茶樹載回來，將這座公園添加了一份生氣。</p>
            <p align="center"><img src="5_files/DSCI00310011.jpg" height="438" width="585"></p>
            <p align="center">踏查完留下一個美美倩影</p>
            <p align="center">來到家修公園，記得，要好好欣賞這些綠色植物，不要辜負村長與村長太太的心意。</p>
            <p align="left"><font size="+2"><a href="../xiali.htm">&lt;--回下犁村首頁</a></font></p></td>
