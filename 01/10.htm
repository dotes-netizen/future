          <td><div align="center">
            <p>這是柯家古厝的樣子，主人很親切的和我們說可以到處看看。</p>
            <p><img src="10_files/img0704_112135228.jpg" height="240" width="320"></p>
            <p>從頭到尾一直對我們叫的狗，我們的組長還被他嚇到逃了出來呢！＝＝</p>
            <p><img src="10_files/img0704_112229219.jpg" height="240" width="320"></p>
            <p>在拍照的時候意外地拍到用布做的春聯，而且是富潤公司做的呢～</p>
            <table border="1" width="200">
              <tbody><tr>
                <td><img src="10_files/img0704_112150061.jpg" height="320" width="240"></td>
                <td><img src="10_files/img0704_112201781.jpg" height="240" width="320"></td>
              </tr>
            </tbody></table>
            <p>這些木頭都是被火燒過的木頭。</p>
            <p><img src="10_files/img0704_112338267.jpg" height="240" width="320"></p>
            <p align="left">　　　　　　　　　　　　　痾…你們兩個不擠嗎？　　　好像靈異照片ＸＤ</p>
            <p><img src="10_files/img0704_112815699.jpg" height="320" width="240"><img src="10_files/img0704_112533060.jpg" height="320" width="240"></p>
            <p>在古厝裡的照片～</p>
            <table border="1" width="200">
              <tbody><tr>
                <td><img src="10_files/img0704_113322304.jpg" height="240" width="320"></td>
                <td><img src="10_files/img0704_113438923.jpg" height="320" width="240"></td>
              </tr>
              <tr>
                <td><img src="10_files/img0704_113535704.jpg" height="320" width="240"></td>
                <td><img src="10_files/img0704_113407242.jpg" height="320" width="240"></td>
              </tr>
            </tbody></table>
            <p>組長竟然想重現摸乳巷？！真是太邪惡了！把邪惡的組長關起來！（邪惡的笑容）</p>
            <p><img src="10_files/img0704_113608323.jpg" height="320" width="240"></p>
            <p><b><font color="#000000">「</font><font color="#FF0000">我不是強姦犯～！<font color="#000000">QAQ」</font></font></b>（組長的吶喊）</p>
